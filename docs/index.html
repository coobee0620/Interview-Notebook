<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>技术面试笔记</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="技术面试笔记 - Java、计算机网络、算法、操作系统、数据库、分布式等">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📘</text></svg>">

  <!-- docsify-themeable 基础高级白主题 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0.9.0/dist/css/theme-simple.css">

  <!-- 高级质感自定义样式 -->
  <link rel="stylesheet" href="./custom.css">
</head>
<body>
  <div id="app">正在加载文档内容...</div>
  <script>
    window.$docsify = {
      basePath: './',
      relativePath: true,
      name: '技术面试笔记',
      nameLink: '/',
      repo: 'https://github.com/coobee0620/Interview-Notebook',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,

      // 搜索配置
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索',
        noData: '未找到相关内容',
        depth: 3
      },

      // 代码复制
      copyCode: {
        buttonText: '复制代码',
        errorText: '复制出错',
        successText: '已复制'
      },

      // 分页导航
      pagination: {
        previousText: '上一节',
        nextText: '下一节',
        crossChapter: true
      },

      // 字数统计
      count: {
        countable: true,
        position: 'top',
        margin: '10px',
        float: 'right',
        fontsize: '0.85em',
        color: '#999',
        language: 'chinese'
      },



      // themeable 配色体系
      themeable: {
        readyTransition: true,
        responsiveTables: true
      }
    }
  </script>

  <!-- Docsify v4 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>

  <!-- 搜索插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/search.min.js"></script>

  <!-- 代码高亮 -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-c.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cpp.min.js"></script>

  <!-- 代码复制 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2.1.1/dist/docsify-copy-code.min.js"></script>

  <!-- 分页导航 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2.10.1/dist/docsify-pagination.min.js"></script>

  <!-- 字数统计 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-count@1.0.13/dist/countable.min.js"></script>

  <!-- 侧边栏折叠 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse@1.3.3/dist/docsify-sidebar-collapse.min.js"></script>

  <!-- 返回顶部 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-back-to-top@1.0.0/dist/docsify-back-to-top.min.js"></script>

</body>
</html>
